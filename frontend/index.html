<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Multi-Agent AI Research Assistant</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap"
    rel="stylesheet">
  <style>
    * {
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
    }

    .mono {
      font-family: 'JetBrains Mono', monospace;
    }

    body {
      overscroll-behavior: none;
    }

    .bg-grid {
      background-image:
        linear-gradient(rgba(255, 255, 255, 0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255, 255, 255, 0.03) 1px, transparent 1px);
      background-size: 40px 40px;
    }

    /* Glass */
    .glass {
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
    }

    /* Bot */
    #bot {
      transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1);
      will-change: transform;
    }

    #bot-glow {
      transition: transform 0.4s ease-out, opacity 0.4s ease;
      will-change: transform, opacity;
    }

    .eye {
      width: 48px;
      height: 48px;
      background: radial-gradient(circle at center, #020617 60%, #0f172a 100%);
      border: 1px solid rgba(255, 255, 255, 0.12);
      box-shadow: inset 0 6px 16px rgba(0, 0, 0, 0.8), inset 0 -1px 0 rgba(255, 255, 255, 0.05);
      transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
    }

    @media (min-width: 768px) {
      .eye {
        width: 60px;
        height: 60px;
      }
    }

    .pupil {
      width: 18px;
      height: 18px;
      background: radial-gradient(circle at 30% 30%, #a5f3fc, #22d3ee 35%, #8b5cf6 70%);
      border-radius: 50%;
      box-shadow:
        0 0 12px rgba(34, 211, 238, 0.9),
        0 0 24px rgba(139, 92, 246, 0.5),
        inset -2px -2px 4px rgba(0, 0, 0, 0.3);
      transition: transform 0.12s ease-out, opacity 0.3s ease;
      will-change: transform;
      position: relative;
    }

    .pupil::after {
      content: '';
      position: absolute;
      top: 3px;
      left: 4px;
      width: 5px;
      height: 5px;
      background: white;
      border-radius: 50%;
      opacity: 0.95;
      filter: blur(0.2px);
    }

    /* States */
    .sleeping #bot {
      transform: translateY(4px) scale(0.97);
      animation: breathe 4.5s ease-in-out infinite;
    }

    .sleeping .eye {
      height: 4px !important;
      width: 32px;
      background: #1e293b;
      border-color: rgba(255, 255, 255, 0.06);
      box-shadow: none;
    }

    .sleeping .pupil {
      opacity: 0;
      transform: scale(0.3) !important;
    }

    .sleeping #bot-glow {
      opacity: 0.25 !important;
    }

    .awake #bot {
      transform: translateY(-4px) scale(1);
      animation: none;
    }

    .awake .eye {
      height: 48px;
    }

    @media (min-width: 768px) {
      .awake .eye {
        height: 60px;
      }
    }

    .active #bot {
      transform: translateY(-8px) scale(1.02);
    }

    .active .eye {
      height: 52px;
      box-shadow:
        inset 0 6px 16px rgba(0, 0, 0, 0.8),
        0 0 20px rgba(34, 211, 238, 0.25);
    }

    @media (min-width: 768px) {
      .active .eye {
        height: 64px;
      }
    }

    @keyframes breathe {

      0%,
      100% {
        transform: translateY(4px) scale(0.97);
      }

      50% {
        transform: translateY(0px) scale(0.98);
      }
    }

    /* Orbitals */
    .orbital {
      border: 1px solid rgba(255, 255, 255, 0.08);
      mask: radial-gradient(circle, transparent 68%, black 70%, black 72%, transparent 74%);
      -webkit-mask: radial-gradient(circle, transparent 68%, black 70%, black 72%, transparent 74%);
    }

    .orbital::before {
      content: '';
      position: absolute;
      inset: -2px;
      border-radius: 50%;
      background: conic-gradient(from 0deg, transparent 0deg, rgba(34, 211, 238, 0) 60deg, rgba(34, 211, 238, 0.8) 120deg, rgba(139, 92, 246, 0.8) 180deg, rgba(217, 70, 239, 0.8) 240deg, transparent 300deg);
      filter: blur(8px);
      opacity: 0;
      transition: opacity 0.5s;
    }

    .spin-slow {
      animation: spin 18s linear infinite;
    }

    .spin-fast {
      animation: spin 3s linear infinite;
    }

    .spin-paused {
      animation-play-state: paused;
    }

    .spin-reverse {
      animation-direction: reverse;
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }

    .active .orbital::before,
    .processing .orbital::before {
      opacity: 0.9;
    }

    .active #orbital-1,
    .processing #orbital-1 {
      border-color: rgba(34, 211, 238, 0.35);
      box-shadow: 0 0 40px rgba(34, 211, 238, 0.15), inset 0 0 20px rgba(34, 211, 238, 0.05);
    }

    .active #orbital-2,
    .processing #orbital-2 {
      border-color: rgba(139, 92, 246, 0.35);
      box-shadow: 0 0 40px rgba(139, 92, 246, 0.15), inset 0 0 20px rgba(139, 92, 246, 0.05);
    }

    /* Agents */
    .agent-pill {
      transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .agent-pill.active {
      background-color: rgba(255, 255, 255, 0.08);
      border-color: rgba(255, 255, 255, 0.2);
      color: white;
      transform: translateY(-1px);
    }

    .agent-pill[data-agent="researcher"].active {
      background-color: rgba(34, 211, 238, 0.15);
      border-color: rgba(34, 211, 238, 0.5);
      color: #a5f3fc;
      box-shadow: 0 0 20px rgba(34, 211, 238, 0.2);
    }

    .agent-pill[data-agent="researcher"].active .dot {
      background-color: #22d3ee;
      box-shadow: 0 0 8px rgba(34, 211, 238, 0.8);
    }

    .agent-pill[data-agent="analyzer"].active {
      background-color: rgba(139, 92, 246, 0.15);
      border-color: rgba(139, 92, 246, 0.5);
      color: #ddd6fe;
      box-shadow: 0 0 20px rgba(139, 92, 246, 0.2);
    }

    .agent-pill[data-agent="analyzer"].active .dot {
      background-color: #8b5cf6;
      box-shadow: 0 0 8px rgba(139, 92, 246, 0.8);
    }

    .agent-pill[data-agent="synthesizer"].active {
      background-color: rgba(217, 70, 239, 0.15);
      border-color: rgba(217, 70, 239, 0.5);
      color: #f5d0fe;
      box-shadow: 0 0 20px rgba(217, 70, 239, 0.2);
    }

    .agent-pill[data-agent="synthesizer"].active .dot {
      background-color: #d946ef;
      box-shadow: 0 0 8px rgba(217, 70, 239, 0.8);
    }

    .agent-pill[data-agent="verifier"].active {
      background-color: rgba(14, 165, 233, 0.15);
      border-color: rgba(14, 165, 233, 0.5);
      color: #bae6fd;
      box-shadow: 0 0 20px rgba(14, 165, 233, 0.2);
    }

    .agent-pill[data-agent="verifier"].active .dot {
      background-color: #0ea5e9;
      box-shadow: 0 0 8px rgba(14, 165, 233, 0.8);
    }

    /* Dots */
    .dots span {
      animation: blink 1.4s infinite;
      opacity: 0;
    }

    .dots span:nth-child(2) {
      animation-delay: 0.2s;
    }

    .dots span:nth-child(3) {
      animation-delay: 0.4s;
    }

    @keyframes blink {

      0%,
      60%,
      100% {
        opacity: 0;
      }

      30% {
        opacity: 1;
      }
    }

    /* Input */
    #topic {
      caret-color: #22d3ee;
    }

    #topic:focus+#input-label,
    #topic:not(:placeholder-shown)+#input-label {
      transform: translateY(-10px) scale(0.85);
      opacity: 0.7;
    }

    /* Particles */
    .particle {
      position: absolute;
      width: 2px;
      height: 2px;
      background: white;
      border-radius: 50%;
      opacity: 0;
      animation: twinkle 6s infinite;
    }

    @keyframes twinkle {

      0%,
      100% {
        opacity: 0;
        transform: scale(0.5);
      }

      50% {
        opacity: 0.6;
        transform: scale(1);
      }
    }

    /* Results */
    .result-card {
      animation: slideUp 0.5s cubic-bezier(0.4, 0, 0.2, 1) forwards;
      opacity: 0;
      transform: translateY(20px);
    }

    @keyframes slideUp {
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }
  </style>
</head>

<body
  class="bg-slate-950 text-white min-h-screen overflow-x-hidden antialiased selection:bg-violet-500/30 selection:text-violet-200">
  <!-- Background -->
  <div class="pointer-events-none fixed inset-0 z-0">
    <div class="absolute inset-0 bg-slate-950"></div>
    <div
      class="absolute inset-0 opacity-[0.6] bg-[radial-gradient(800px_circle_at_50%_0%,rgba(56,189,248,0.15),transparent_60%),radial-gradient(600px_circle_at_80%_80%,rgba(139,92,246,0.12),transparent_50%),radial-gradient(500px_circle_at_20%_90%,rgba(217,70,239,0.1),transparent_50%)]">
    </div>
    <div class="absolute inset-0 bg-grid"></div>
    <div id="particles" class="absolute inset-0"></div>
  </div>

  <div class="relative z-10 flex min-h-screen flex-col">
    <!-- Header -->
    <header class="flex items-center justify-between px-4 py-5 md:px-8">
      <div class="flex items-center gap-3">
        <div class="relative">
          <div
            class="h-8 w-8 rounded-xl bg-white/5 border border-white/10 backdrop-blur-xl flex items-center justify-center">
            <div class="h-3 w-3 rounded-full bg-gradient-to-br from-cyan-400 to-violet-500 blur-[1px]"></div>
            <div class="absolute h-3 w-3 rounded-full bg-gradient-to-br from-cyan-400 to-violet-500"></div>
          </div>
        </div>
        <div>
          <h1 class="text-[15px] font-medium tracking-wide text-white/90">Research Lab</h1>
          <p class="text-[11px] text-slate-500 -mt-0.5">Multi-Agent System</p>
        </div>
      </div>
      <div
        class="hidden sm:flex items-center gap-2 rounded-full border border-white/10 bg-white/5 px-3 py-1.5 backdrop-blur-xl">
        <div class="h-1.5 w-1.5 animate-pulse rounded-full bg-emerald-400"></div>
        <span class="text-xs text-slate-300">4 agents online</span>
      </div>
    </header>

    <!-- Main -->
    <main class="flex-1 flex flex-col items-center justify-center px-4 py-6 md:py-10">
      <div class="w-full max-w-6xl flex flex-col items-center">
        <!-- Bot -->
        <div id="bot-wrapper" class="relative sleeping">
          <!-- Glow -->
          <div id="bot-glow"
            class="absolute -inset-20 rounded-full bg-gradient-to-r from-cyan-400/20 via-violet-500/20 to-fuchsia-500/20 blur-3xl will-change-transform"
            style="opacity:0.3; transform:scale(0.75)"></div>

          <!-- Orbitals -->
          <div id="orbital-1"
            class="orbital spin-slow spin-paused absolute -inset-4 md:-inset-6 rounded-full transition-all duration-700">
          </div>
          <div id="orbital-2"
            class="orbital spin-slow spin-paused spin-reverse absolute -inset-8 md:-inset-12 rounded-full transition-all duration-700"
            style="animation-duration: 24s"></div>

          <!-- Bot Head -->
          <div id="bot" class="relative">
            <div class="relative h-44 w-44 sm:h-52 sm:w-52 md:h-60 md:w-60">
              <!-- Outer ring -->
              <div
                class="absolute inset-0 rounded-full bg-gradient-to-b from-white/15 to-white/5 p-[1px] shadow-[0_0_80px_rgba(56,189,248,0.15)]">
                <div class="h-full w-full rounded-full bg-gradient-to-b from-slate-900 to-slate-950"></div>
              </div>

              <!-- Inner face -->
              <div
                class="absolute inset-[8%] rounded-full bg-[radial-gradient(circle_at_50%_0%,rgba(255,255,255,0.08),transparent_60%)] border border-white/10 overflow-hidden">
                <div class="absolute inset-0 bg-gradient-to-b from-slate-800/80 to-slate-900/90"></div>
                <!-- Screen glare -->
                <div
                  class="absolute -top-10 left-1/2 h-24 w-40 -translate-x-1/2 rounded-[50%] bg-gradient-to-b from-white/[0.07] to-transparent blur-xl">
                </div>

                <!-- Eyes -->
                <div class="absolute inset-0 flex items-center justify-center gap-7 md:gap-9">
                  <div class="eye rounded-full flex items-center justify-center">
                    <div class="pupil" id="pupil-l"></div>
                  </div>
                  <div class="eye rounded-full flex items-center justify-center">
                    <div class="pupil" id="pupil-r"></div>
                  </div>
                </div>

                <!-- Mouth grill -->
                <div class="absolute bottom-[22%] left-1/2 -translate-x-1/2 flex gap-1">
                  <div class="h-[2px] w-4 rounded-full bg-white/10"></div>
                  <div class="h-[2px] w-3 rounded-full bg-white/10"></div>
                  <div class="h-[2px] w-4 rounded-full bg-white/10"></div>
                </div>
              </div>

              <!-- Chin light -->
              <div class="absolute -bottom-1 left-1/2 h-8 w-24 -translate-x-1/2 rounded-[50%] bg-cyan-400/20 blur-2xl">
              </div>
            </div>
          </div>
        </div>

        <!-- Status -->
        <div class="mt-10 text-center">
          <div id="status-text"
            class="text-[13px] font-medium tracking-wide text-slate-400 transition-all duration-300">Idle — awaiting
            research topic</div>
          <div class="mt-1.5 flex items-center justify-center gap-1.5">
            <div class="h-px w-8 bg-gradient-to-r from-transparent to-white/20"></div>
            <div class="h-1 w-1 rounded-full bg-white/20"></div>
            <div class="h-px w-8 bg-gradient-to-l from-transparent to-white/20"></div>
          </div>
        </div>
      </div>

      <!-- Results Panel -->
      <div id="results-panel" class="mt-12 w-full max-w-5xl hidden">
        <div class="mb-6 flex items-center gap-3">
          <div class="h-px flex-1 bg-gradient-to-r from-transparent to-white/10"></div>
          <span class="text-xs uppercase tracking-widest text-slate-500">Research Complete</span>
          <div class="h-px flex-1 bg-gradient-to-l from-transparent to-white/10"></div>
        </div>
        <div id="results-grid" class="grid gap-3 sm:grid-cols-2 lg:grid-cols-4"></div>
      </div>
    </main>

    <!-- Input Area -->
    <div
      class="sticky bottom-0 z-20 px-4 pb-5 pt-3 md:px-6 md:pb-8 bg-gradient-to-t from-slate-950 via-slate-950/90 to-transparent">
      <div class="mx-auto w-full max-w-3xl">
        <!-- Agents -->
        <div class="mb-3 flex flex-wrap items-center justify-center gap-1.5 sm:gap-2">
          <div
            class="agent-pill group flex items-center gap-1.5 rounded-full border border-white/10 bg-white/5 px-2.5 py-1.5 text-[11px] font-medium text-slate-400 backdrop-blur-xl"
            data-agent="researcher">
            <span class="dot h-1.5 w-1.5 rounded-full bg-slate-600 transition-all"></span>
            Researcher
          </div>
          <div
            class="agent-pill group flex items-center gap-1.5 rounded-full border border-white/10 bg-white/5 px-2.5 py-1.5 text-[11px] font-medium text-slate-400 backdrop-blur-xl"
            data-agent="analyzer">
            <span class="dot h-1.5 w-1.5 rounded-full bg-slate-600 transition-all"></span>
            Analyzer
          </div>
          <div
            class="agent-pill group flex items-center gap-1.5 rounded-full border border-white/10 bg-white/5 px-2.5 py-1.5 text-[11px] font-medium text-slate-400 backdrop-blur-xl"
            data-agent="synthesizer">
            <span class="dot h-1.5 w-1.5 rounded-full bg-slate-600 transition-all"></span>
            Synthesizer
          </div>
          <div
            class="agent-pill group flex items-center gap-1.5 rounded-full border border-white/10 bg-white/5 px-2.5 py-1.5 text-[11px] font-medium text-slate-400 backdrop-blur-xl"
            data-agent="verifier">
            <span class="dot h-1.5 w-1.5 rounded-full bg-slate-600 transition-all"></span>
            Verifier
          </div>
        </div>

        <!-- Input -->
        <div class="group relative">
          <div
            class="pointer-events-none absolute -inset-0.5 rounded-[26px] bg-gradient-to-r from-cyan-400/0 via-violet-500/0 to-fuchsia-500/0 opacity-0 blur-2xl transition-all duration-500 group-focus-within:opacity-100 group-focus-within:from-cyan-400/20 group-focus-within:via-violet-500/20 group-focus-within:to-fuchsia-500/20">
          </div>

          <div
            class="relative overflow-hidden rounded-[24px] border border-white/10 bg-white/5 shadow-[0_8px_40px_rgba(0,0,0,0.4)] backdrop-blur-xl">
            <div class="pointer-events-none absolute inset-0 opacity-50"
              style="background: radial-gradient(600px circle at var(--x,50%) var(--y,50%), rgba(139,92,246,0.15), transparent 40%)">
            </div>

            <form id="research-form" class="relative flex items-end gap-2 p-2.5 sm:p-3">
              <div class="relative min-w-0 flex-1">
                <input id="topic" type="text" placeholder=" " autocomplete="off" spellcheck="false"
                  class="peer w-full bg-transparent px-3.5 pb-2.5 pt-5 text-[15px] leading-6 text-white placeholder-transparent outline-none sm:px-4">
                <label id="input-label" for="topic"
                  class="pointer-events-none absolute left-3.5 top-3 text-[13px] text-slate-500 transition-all duration-200 peer-focus:top-2 peer-focus:text-[11px] peer-focus:text-violet-300/80 peer-[:not(:placeholder-shown)]:top-2 peer-[:not(:placeholder-shown)]:text-[11px] sm:left-4">Enter
                  research topic...</label>
              </div>

              <button id="submit-btn" type="submit"
                class="group/btn relative flex h-11 w-11 shrink-0 items-center justify-center overflow-hidden rounded-2xl bg-white text-slate-950 transition-all duration-300 hover:scale-[1.02] active:scale-[0.98] disabled:opacity-60">
                <div
                  class="absolute inset-0 bg-gradient-to-br from-cyan-400 to-violet-500 opacity-0 transition-opacity group-hover/btn:opacity-100">
                </div>
                <svg id="submit-icon"
                  class="relative h-[18px] w-[18px] transition-transform group-hover/btn:translate-x-0.5" fill="none"
                  viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                  <path stroke-linecap="round" stroke-linejoin="round" d="M13 7l5 5m0 0l-5 5m5-5H6" />
                </svg>
                <svg id="submit-spinner" class="relative hidden h-5 w-5 animate-spin" viewBox="0 0 24 24">
                  <circle class="opacity-20" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="3"
                    fill="none" />
                  <path class="opacity-90" fill="currentColor" d="M4 12a8 8 0 018-8v3a5 5 0 00-5 5H4z" />
                </svg>
              </button>
            </form>
          </div>

          <div class="mt-2.5 flex items-center justify-between px-1 text-[11px] text-slate-500">
            <span class="hidden sm:block">Press Enter to research • Shift+Enter for new line</span>
            <span class="sm:hidden">Multi-agent analysis</span>
            <span class="flex items-center gap-1"><span
                class="h-1 w-1 rounded-full bg-emerald-400/70"></span>Secure</span>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script>
    // Elements
    const topic = document.getElementById('topic');
    const botWrapper = document.getElementById('bot-wrapper');
    const botGlow = document.getElementById('bot-glow');
    const orbital1 = document.getElementById('orbital-1');
    const orbital2 = document.getElementById('orbital-2');
    const pupils = document.querySelectorAll('.pupil');
    const statusText = document.getElementById('status-text');
    const inputLabel = document.getElementById('input-label');
    const agents = document.querySelectorAll('.agent-pill');
    const form = document.getElementById('research-form');
    const submitBtn = document.getElementById('submit-btn');
    const submitIcon = document.getElementById('submit-icon');
    const submitSpinner = document.getElementById('submit-spinner');
    const resultsPanel = document.getElementById('results-panel');
    const resultsGrid = document.getElementById('results-grid');
    const inputWrap = document.querySelector('.group.relative');

    // Particles
    const particles = document.getElementById('particles');
    for (let i = 0; i < 80; i++) {
      const p = document.createElement('div');
      p.className = 'particle';
      p.style.left = Math.random() * 100 + '%';
      p.style.top = Math.random() * 100 + '%';
      p.style.animationDelay = Math.random() * 6 + 's';
      p.style.opacity = Math.random() * 0.5 + 0.1;
      particles.appendChild(p);
    }

    // Mouse glow follow
    inputWrap.addEventListener('pointermove', (e) => {
      const r = inputWrap.getBoundingClientRect();
      inputWrap.style.setProperty('--x', (e.clientX - r.left) + 'px');
      inputWrap.style.setProperty('--y', (e.clientY - r.top) + 'px');
    });

    /**
     * Update bot visual state based on input length
     * @param {number} length - character count
     */
    function updateBotState(length) {
      botWrapper.classList.remove('sleeping', 'awake', 'active', 'processing');

      // Reset agents
      agents.forEach(a => a.classList.remove('active'));

      if (length === 0) {
        // 0 chars: sleeping
        botWrapper.classList.add('sleeping');
        orbital1.classList.add('spin-paused');
        orbital2.classList.add('spin-paused');
        orbital1.classList.remove('spin-fast');
        orbital2.classList.remove('spin-fast');
        botGlow.style.opacity = '0.25';
        botGlow.style.transform = 'scale(0.75)';
        statusText.textContent = 'Idle — awaiting research topic';
        inputLabel.innerHTML = 'Enter research topic...';
        return;
      }

      if (length <= 10) {
        // 1-10 chars: waking
        botWrapper.classList.add('awake');
        orbital1.classList.remove('spin-paused', 'spin-fast');
        orbital2.classList.remove('spin-paused', 'spin-fast');
        orbital1.classList.add('spin-slow');
        orbital2.classList.add('spin-slow');
        const scale = 0.8 + length * 0.025;
        botGlow.style.opacity = '0.55';
        botGlow.style.transform = `scale(${scale})`;
        statusText.textContent = 'Listening…';
        inputLabel.textContent = 'Enter research topic...';
        agents[0].classList.add('active');
      } else {
        // 11+ chars: fully awake
        botWrapper.classList.add('active');
        orbital1.classList.remove('spin-paused');
        orbital2.classList.remove('spin-paused');
        orbital1.classList.add('spin-fast');
        orbital2.classList.add('spin-fast');
        const scale = 0.95 + Math.min(length * 0.008, 0.35);
        botGlow.style.opacity = '0.9';
        botGlow.style.transform = `scale(${scale})`;
        statusText.innerHTML = 'Analyzing scope<span class="dots"><span>.</span><span>.</span></span>';
        inputLabel.innerHTML = 'Analyzing scope<span class="dots"><span>.</span><span>.</span><span>.</span></span>';

        // Light up agents sequentially
        const count = Math.min(4, 1 + Math.floor((length - 11) / 5));
        agents.forEach((a, i) => {
          if (i < count) setTimeout(() => a.classList.add('active'), i * 120);
        });
      }

      // Pupil tracking based on length
      const offset = ((length % 20) - 10) * 1.1;
      pupils.forEach(p => p.style.transform = `translateX(${offset}px)`);
    }

    /**
     * Track eyes based on cursor position
     * @param {Event} e - input event
     */
    function trackEyes(e) {
      const el = e.target;
      const pos = el.selectionStart || 0;
      const len = Math.max(1, el.value.length);
      const ratio = Math.min(1, pos / len);
      const offset = (ratio - 0.5) * 14;
      pupils.forEach(p => p.style.transform = `translateX(${offset}px)`);
    }

    /**
     * Simulate agents activating sequentially
     */
    function simulateAgents() {
      agents.forEach(a => a.classList.remove('active'));
      agents.forEach((agent, i) => {
        setTimeout(() => agent.classList.add('active'), i * 220);
      });
    }

    // Input listeners
    topic.addEventListener('input', (e) => updateBotState(e.target.value.length));
    topic.addEventListener('keyup', trackEyes);
    topic.addEventListener('click', trackEyes);
    topic.addEventListener('focus', () => { if (!topic.value) updateBotState(1); });
    topic.addEventListener('blur', () => { if (!topic.value) updateBotState(0); });

    // Form submit
    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      const query = topic.value.trim();
      if (!query) {
        topic.focus();
        return;
      }

      // Processing state
      submitBtn.disabled = true;
      submitIcon.classList.add('hidden');
      submitSpinner.classList.remove('hidden');
      botWrapper.classList.add('processing', 'active');
      orbital1.classList.add('spin-fast');
      orbital2.classList.add('spin-fast');
      statusText.innerHTML = 'Deploying agents<span class="dots"><span>.</span><span>.</span></span>';
      simulateAgents();

      // TODO: Replace with fetch('/api/research', {method:'POST', body:JSON.stringify({query})})
      async function handleSubmit() {
        const query = input.value.trim();
        if (!query) return;

        // show processing state
        updateBotState(999);

        const res = await fetch('/api/research', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ query })
        });

        const data = await res.json();

        // render results - adapt to your pipeline output
        resultsPanel.innerHTML = `
    <div class="glass p-4">${data.summary || JSON.stringify(data)}</div>
  `;
      }
      await new Promise(r => setTimeout(r, 2200));

      // Mock results
      showResults(query);

      // Reset
      submitBtn.disabled = false;
      submitIcon.classList.remove('hidden');
      submitSpinner.classList.add('hidden');
      statusText.textContent = 'Research complete — ready for next query';
      botWrapper.classList.remove('processing');
      updateBotState(topic.value.length);
    });

    function showResults(query) {
      resultsPanel.classList.remove('hidden');

      const cards = [
        {
          title: 'Research Summary',
          icon: '◈',
          color: 'from-cyan-400/20 to-cyan-600/20',
          content: `Comprehensive analysis of "${query}" completed across 47 sources. Multi-agent consensus achieved with high confidence.`
        },
        {
          title: 'Key Findings',
          icon: '⬙',
          color: 'from-violet-500/20 to-violet-700/20',
          content: '• 3 primary themes identified\n• 12 supporting studies\n• Cross-validated by Verifier'
        },
        {
          title: 'Sources',
          icon: '⬖',
          color: 'from-fuchsia-500/20 to-fuchsia-700/20',
          content: 'ArXiv: 18 • PubMed: 12\nSemantic Scholar: 9 • Web: 8'
        },
        {
          title: 'Confidence',
          icon: '⬗',
          color: 'from-sky-500/20 to-blue-600/20',
          content: '94.2% consensus\nVerified by 4 agents\nLow contradiction rate'
        }
      ];

      resultsGrid.innerHTML = cards.map((card, i) => `
        <div class="result-card glass relative overflow-hidden rounded-3xl border border-white/10 bg-white/5 p-5" style="animation-delay: ${i * 80}ms">
          <div class="absolute inset-0 opacity-60 bg-gradient-to-b ${card.color}"></div>
          <div class="relative">
            <div class="mb-3 flex items-center gap-2">
              <div class="flex h-8 w-8 items-center justify-center rounded-xl border border-white/10 bg-white/5 text-[14px]">${card.icon}</div>
              <h3 class="text-[13px] font-medium tracking-wide text-white/90">${card.title}</h3>
            </div>
            <p class="whitespace-pre-line text-[13px] leading-relaxed text-slate-300">${card.content}</p>
          </div>
        </div>
      `).join('');

      resultsPanel.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
    }

    // Init
    updateBotState(0);
    topic.focus();
  </script>
